<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lubricant Cost Dynamics Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
</head>
<body>
    <!-- Main Dashboard -->
    <div class="dashboard">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <h1>Lubricant Cost Dynamics</h1>
                <span class="subtitle">Product group cost tracking over time</span>
            </div>
            <div class="header-center">
                <div class="date-range-picker">
                    <button class="range-btn" data-range="3M">3M</button>
                    <button class="range-btn" data-range="6M">6M</button>
                    <button class="range-btn active" data-range="1Y">1Y</button>
                    <button class="range-btn" data-range="2Y">2Y</button>
                </div>
            </div>
            <div class="header-right">
                <div class="product-filter">
                    <label for="productSelect">Breakdown:</label>
                    <select id="productSelect">
                        <option value="GI">General Industrial</option>
                        <option value="MWF">Metalworking Fluids</option>
                        <option value="HighPerf">High Performance</option>
                        <option value="Grease">Grease</option>
                    </select>
                </div>
            </div>
        </header>

        <!-- Main Chart: Product Groups Over Time -->
        <section class="chart-section-main">
            <div class="chart-container chart-full">
                <div class="chart-header">
                    <h3>Product Group Cost Index Over Time</h3>
                    <div class="chart-legend" id="trendLegend"></div>
                </div>
                <div class="chart-body chart-tall">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>
        </section>

        <!-- Secondary Charts Row -->
        <section class="charts-row">
            <div class="chart-container">
                <div class="chart-header">
                    <h3>Cost Breakdown</h3>
                    <span class="chart-subtitle" id="breakdownProduct">General Industrial</span>
                </div>
                <div class="chart-body">
                    <canvas id="breakdownChart"></canvas>
                </div>
            </div>
            <div class="chart-container">
                <div class="chart-header">
                    <h3>Period Change by Product</h3>
                </div>
                <div class="chart-body">
                    <canvas id="yoyChart"></canvas>
                </div>
            </div>
        </section>

        <!-- Raw Factors Chart -->
        <section class="chart-section">
            <div class="chart-container chart-full">
                <div class="chart-header">
                    <h3>Raw Cost Factors</h3>
                    <span class="chart-subtitle">Base Oil, Crude, Additives, Transport, etc.</span>
                </div>
                <div class="chart-body">
                    <canvas id="factorsChart"></canvas>
                </div>
            </div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <div class="footer-left">
                <span>Data: </span>
                <a href="https://fred.stlouisfed.org/" target="_blank">FRED</a>
                <span> | </span>
                <a href="https://www.frankfurter.app/" target="_blank">Frankfurter</a>
            </div>
            <div class="footer-center">
                <span id="lastUpdated">Loading...</span>
            </div>
            <div class="footer-right">
                <button class="btn btn-secondary" id="refreshData">
                    <span class="refresh-icon">&#8635;</span> Refresh
                </button>
            </div>
        </footer>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
        <p id="loadingText">Loading data...</p>
    </div>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/fredApi.js"></script>
    <script src="js/frankfurterApi.js"></script>
    <script src="js/charts.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
